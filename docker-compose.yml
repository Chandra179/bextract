services:
  arangodb:
    image: arangodb:latest 
    ports:
      - "8529:8529"
    environment:
      ARANGO_NO_AUTH: "1"
    volumes:
      - arangodb_data:/var/lib/arangodb3
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8529/_api/version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  browserless:
    image: ghcr.io/browserless/chromium:latest
    ports:
      - "3000:3000"
    environment:
      - TIMEOUT=0
      - CONCURRENT=5
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/pressure"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  bextract:
    build: .
    ports:
      - "8080:8080"
    shm_size: '256mb'
    security_opt:
      - seccomp:unconfined
    environment:
      - GIN_MODE=release
      - ROD_BROWSER_BIN=/usr/bin/chromium
      - ARANGO_HOST=http://arangodb:8529
      - ARANGO_PASSWORD=admin
      - BROWSERLESS_URL=ws://browserless:3000/chromium
    volumes:
      - ./config.yaml:/app/config.yaml
    depends_on:
      arangodb:
        condition: service_healthy
      browserless:
        condition: service_healthy

volumes:
  arangodb_data:

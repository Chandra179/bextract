services:
  arangodb:
    image: arangodb:latest 
    ports:
      - "8529:8529"
    environment:
      ARANGO_NO_AUTH: "1"
    volumes:
      - arangodb_data:/var/lib/arangodb3
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8529/_api/version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  bextract:
    build: .
    ports:
      - "8080:8080"
    security_opt:
      - seccomp:unconfined
    environment:
      - GIN_MODE=release
      - ROD_BROWSER_BIN=/usr/bin/chromium
      - ARANGO_HOST=http://arangodb:8529  # <--- Add this
      - ARANGO_PASSWORD=admin
    volumes:
      - ./config.yaml:/app/config.yaml
    depends_on:
      arangodb:
        condition: service_healthy

volumes:
  arangodb_data:

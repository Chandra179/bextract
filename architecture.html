
<div id="diagram"></div>
<style>
#diagram { padding: 1rem 0; }
#diagram svg { width: 100% !important; max-width: 100%; }
</style>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#3C3489',
    primaryBorderColor: dark ? '#7F77DD' : '#7F77DD',
    lineColor: dark ? '#9c9a92' : '#5F5E5A',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    tertiaryColor: dark ? '#444441' : '#F1EFE8',
    clusterBkg: dark ? '#2C2C2A' : '#F1EFE8',
    clusterBorder: dark ? '#888780' : '#B4B2A9',
    edgeLabelBackground: dark ? '#2C2C2A' : '#ffffff',
    fontWeight: '400',
  },
  flowchart: { curve: 'monotoneX', padding: 20 }
});

const diagram = `flowchart TD
    ENTRY([" URL + Target Fields "]):::entry

    subgraph T1["Tier 1 — Static HTTP  (~1MB · &lt;100ms · free)"]
        HTTP["net/http + Colly\\nGET request / redirects"]
        UA["User-Agent pool"]
        HAPI["Hidden API detector\\nXHR / JSON endpoints"]
        HTTP --> UA
        HTTP --> HAPI
    end

    subgraph T2["Tier 2 — Intelligence Layer  (~1MB · &lt;150ms · free)"]
        direction TB
        PHA["Phase A — Script extractors\\nconcurrent"]
        PHB["Phase B — DOM extractors\\nconcurrent"]
        PHC["Phase C — LLM fallback\\noptional · ~$0.0001+"]
        HOLLOW["Hollow detector"]
        MERGE["Merge & quality check"]
        PHA --> HOLLOW
        HOLLOW -->|"content present"| PHB
        PHB --> MERGE
        MERGE -->|"0-field escalate only"| PHC
    end

    subgraph T3["Tier 3 — Go-Rod  (~200MB · 1–3s · free)"]
        ROD["go-rod CDP client"]
        POOL["Warm page pool"]
        RESINT3["Resource interceptor\\nblock CSS / images / fonts"]
        IDLE3["Network idle wait\\n500ms window / 8s cap"]
        ROD --> POOL
        ROD --> RESINT3
        ROD --> IDLE3
    end

    subgraph T4["Tier 4 — Browserless Docker  (~512MB · 2–5s · $0.01)"]
        BL["Browserless container\\nCDP / WebSocket"]
        ISO["Process isolation\\nhard memory ceiling"]
        RESINT4["Resource interceptor\\nblock CSS / images / fonts"]
        IDLE4["Network idle wait\\n500ms window / 15s cap"]
        BL --> ISO
        BL --> RESINT4
        BL --> IDLE4
    end

    subgraph T5["Tier 5 — Stealth Protocol  (~512MB · 3–8s · $0.05+)"]
        PROXY["Residential proxy network\\nsticky or rotating sessions"]
        STEALTH["Stealth-patched Chromium\\nno webdriver fingerprint"]
        PROXY --- STEALTH
    end

    T2ANALYZER["tier2/analyzer.go\\nre-runs on rendered HTML"]

    DECISIONS{{"Decision\\nDone / Escalate / Abort / Backoff"}}

    DONE(["✓ Return data"]):::done
    ABORT(["✗ Abort"]):::abort
    RETRY(["↺ Retry same tier"]):::retry

    ENTRY --> T1
    T1 --> T2
    T2 --> DECISIONS
    DECISIONS -->|"Done"| DONE
    DECISIONS -->|"Abort"| ABORT
    DECISIONS -->|"Backoff"| RETRY
    DECISIONS -->|"Escalate"| T3
    T3 --> T2ANALYZER
    T2ANALYZER -->|"Done"| DONE
    T2ANALYZER -->|"Escalate"| T4
    T4 --> T2ANALYZER
    T2ANALYZER -->|"Escalate"| T5
    T5 -->|"Done / Fail"| DONE

    classDef entry fill:#E1F5EE,stroke:#0F6E56,color:#085041,font-weight:500
    classDef done fill:#EAF3DE,stroke:#3B6D11,color:#27500A,font-weight:500
    classDef abort fill:#FCEBEB,stroke:#A32D2D,color:#791F1F,font-weight:500
    classDef retry fill:#FAEEDA,stroke:#854F0B,color:#633806,font-weight:500
`;

const { svg } = await mermaid.render('mermaid-svg', diagram);
document.getElementById('diagram').innerHTML = svg;
</script>
